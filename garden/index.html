<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vang · the garden</title>
<meta name="description" content="vang's personal blog" />
<meta name="theme-color" content="#52B788" />
<meta property="og:title" content="vang · the garden" />
<meta property="og:description" content="a personal blog. Sign the Koi Pond, your message becomes a koi that swims here forever." />
<meta property="og:type" content="website" />
<meta property="og:image" content="assets/fish2.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="vang · the garden 🐟" />
<meta name="twitter:description" content="Sign the Koi Pond and a koi, named after you, joins the garden and swims here forever." />
<meta name="twitter:image" content="assets/fish2.png" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CradialGradient id='g' cx='38%25' cy='30%25'%3E%3Cstop offset='0' stop-color='%23F2FCFF'/%3E%3Cstop offset='.5' stop-color='%2374C69D'/%3E%3Cstop offset='1' stop-color='%232D6A4F'/%3E%3C/radialGradient%3E%3C/defs%3E%3Cpath d='M50 12C30 28 22 52 50 88C78 52 70 28 50 12Z' fill='url(%23g)'/%3E%3Cpath d='M50 26V80' stroke='%23F2FCFF' stroke-width='3' opacity='.7'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles/garden.css" />
</head>
<body>

  <div class="bg bg-bliss"></div>
  <div class="bg bg-bokeh"></div>
  <div class="bg bg-flare"></div>
  <div class="bg bg-vignette"></div>
  <div id="sky" aria-hidden="true"></div>
  <div id="floor" aria-hidden="true"></div>
  <canvas id="motes" aria-hidden="true"></canvas>

  <div id="gate" role="dialog" aria-label="Entering the garden">
    <div class="gate-inner">
      <img class="gate-leaf" src="assets/leaf_swoosh.png" alt="" />
      <div class="gate-title">vang</div>
      <div class="gate-sub">the garden</div>
      <div class="gate-bar"><i></i></div>
      <button class="gate-skip" id="gate-skip" type="button">Step inside</button>
    </div>
  </div>

  <div class="portal">
    <header class="portal-head">
      <div class="ph-brand" id="brand" role="button" tabindex="0" aria-label="Home">
        <img class="ph-logo" src="assets/leaf_swoosh.png" alt="" />
        <div class="ph-title">vang<small>the garden &middot; a personal blog</small></div>
      </div>
      <div class="ph-tools">
        <div class="ph-clock" id="clock" aria-label="Clock"></div>
        <label class="searchbox"><input id="search" type="search" placeholder="search the garden…" aria-label="Search" /></label>
        <a class="pond-link" id="pond-link" href="#/pond" aria-label="The Koi Pond"><span class="pl-fish"></span>Koi Pond</a>
        <button class="sky-toggle" id="sky-toggle" type="button" aria-pressed="false" aria-label="Toggle day or night"><span class="st-ico"></span><span class="st-label">Daytime</span></button>
        <button class="sound-toggle" id="sound" type="button" aria-pressed="false">Ambience</button>
      </div>
    </header>
    <div class="portal-body">
      <aside class="portal-side" id="side" aria-label="Gadgets"></aside>
      <main class="portal-main" id="app"></main>
    </div>
    <footer class="portal-foot">
      <span class="badge">Best viewed with wonder</span>
      <span class="badge blue">Valid Frutiger Aero</span>
      <span>made of grass &amp; glass by <b>vang</b></span>
      <span class="grow"></span>
      <a href="https://vangax.github.io/" target="_top">vangax.github.io</a>
      <span>&middot; <span id="year"></span></span>
    </footer>
  </div>

  <script type="module" src="js/garden-cloud.js"></script>
  <script src="js/ambient.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/garden.js"></script>
</body>
</html>
